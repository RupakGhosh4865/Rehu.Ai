<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Solution — The Smart Human.ai</title>
<link rel="icon" type="image/svg+xml" href="/static/savant-icon.svg"/>
<link rel="apple-touch-icon" href="/static/savant-icon.svg"/>
<link rel="stylesheet" href="/static/savant-light.css"/>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><img src="/static/savant-logo.svg" alt="Savant.ai"/></a>
  <div style="display:flex;gap:20px">
    <a href="/#solutions" style="color:var(--muted);text-decoration:none;font-size:14px;font-weight:500">Solutions</a>
    <a href="/admin" style="color:var(--muted);text-decoration:none;font-size:14px;font-weight:500">Admin</a>
  </div>
</nav>
<div id="app" class="sol-loading">Loading solution…</div>
<script>
const slug = (location.pathname.match(/\/solutions\/([^/]+)/) || [])[1] || '';

async function load() {
  const app = document.getElementById('app');
  if (!slug) {
    app.className = 'sol-err';
    app.innerHTML = '<p>Solution not found. <a href="/" style="color:var(--accent)">Back home</a></p>';
    return;
  }
  try {
    const [sol, all] = await Promise.all([
      fetch(`/api/solutions/${slug}`).then(r => r.ok ? r.json() : Promise.reject()),
      fetch('/api/solutions').then(r => r.json()),
    ]);
    document.title = `${sol.title} — The Smart Human.ai`;
    const tryBtn = sol.coming_soon
      ? `<span class="btn-hero btn-hero-ghost" style="opacity:.65;cursor:not-allowed">Coming soon — Scale plan</span>`
      : `<a href="${sol.try_url}" class="btn-hero btn-hero-primary">Start Conversation</a>`;
    app.className = 'sol-page';
    app.innerHTML = `
      <div class="sol-badge ${sol.coming_soon ? 'soon' : ''}">${sol.coming_soon ? 'Coming soon' : sol.category}</div>
      <h1>${sol.icon} ${sol.title}</h1>
      <p class="sol-lead">${sol.tagline}</p>
      <div class="sol-roi">
        <div class="sol-roi-item"><div class="sol-roi-val">${sol.roi_value}</div><div class="sol-roi-lbl">${sol.roi_label}</div></div>
        <div class="sol-roi-item"><div class="sol-roi-val">${sol.persona_name}</div><div class="sol-roi-lbl">AI persona</div></div>
      </div>
      <div class="sol-grid">
        <div class="sol-card"><h3>What you get</h3><ul>${(sol.benefits||[]).map(b=>`<li>${b}</li>`).join('')}</ul></div>
        <div class="sol-card sol-cta">
          <p style="color:var(--muted);margin-bottom:16px;font-size:14px">No sign-up · Browser-based · Voice &amp; video</p>
          ${tryBtn}
          <a href="/admin" class="btn-hero btn-hero-ghost" style="margin-top:10px">Train in Admin</a>
          <p style="margin-top:16px;font-size:12px;color:var(--muted)">Upload docs in Admin → Knowledge Base for ${sol.persona_name}.</p>
        </div>
      </div>
      <div class="sol-other">
        <h2>More solutions</h2>
        <div class="sol-other-grid">
          ${(all.solutions||[]).filter(s=>s.slug!==slug).map(s=>`
            <a href="/solutions/${s.slug}"><span>${s.icon}</span>${s.title}</a>
          `).join('')}
        </div>
      </div>`;
  } catch (e) {
    app.className = 'sol-err';
    app.innerHTML = `<p>Could not load "${slug}". <a href="/" style="color:var(--accent)">Back home</a></p>`;
  }
}
load();
</script>
</body>
</html>
