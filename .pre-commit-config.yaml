# Pre-commit hooks for Savant.ai — block secrets from ever being committed.
# Install once:   pip install pre-commit && pre-commit install
# Run on demand:  pre-commit run --all-files
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets (gitleaks)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
